<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Diario de la timidez — una novela</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#f1e9d8;
    --paper-deep:#e8dfc9;
    --ink:#1b1812;
    --ink-soft:#3a3327;
    --ink-mute:#6e6450;
    --rule:#cfc2a3;
    --accent:#7a2331;        /* oxblood, like a bookmark ribbon */
    --accent-soft:#a85a64;
    --serif:"EB Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
    --display:"Instrument Serif", "EB Garamond", Georgia, serif;
    --mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
    --hand:"Caveat", "Bradley Hand", cursive;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--serif);
    font-size:19px;
    line-height:1.55;
    font-feature-settings:"liga","kern","onum","pnum";
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  /* subtle paper texture via layered radial gradients (no images) */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(1200px 800px at 10% -10%, rgba(122,35,49,.05), transparent 60%),
      radial-gradient(900px 700px at 110% 10%, rgba(110,100,80,.10), transparent 55%),
      radial-gradient(1px 1px at 25% 35%, rgba(40,30,15,.06) 50%, transparent 51%),
      radial-gradient(1px 1px at 75% 65%, rgba(40,30,15,.05) 50%, transparent 51%),
      radial-gradient(1px 1px at 55% 15%, rgba(40,30,15,.04) 50%, transparent 51%);
    background-size:auto,auto,3px 3px, 5px 5px, 7px 7px;
    mix-blend-mode:multiply;opacity:.7;
  }
  .grain{
    position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.08;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3'/><feColorMatrix values='0 0 0 0 0.12  0 0 0 0 0.10  0 0 0 0 0.07  0 0 0 0.6 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .root{position:relative;z-index:2}

  /* ─── shared bits ───────────────────────────────────────────────── */
  .container{max-width:1240px;margin:0 auto;padding:0 48px}
  @media (max-width:720px){ .container{padding:0 24px} body{font-size:17.5px} }

  .meta{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--ink-mute);
  }

  .rule{border:0;height:1px;background:var(--rule);margin:0}
  .rule-dashed{border:0;height:0;border-top:1px dashed var(--rule)}

  h1,h2,h3,h4{font-family:var(--display);font-weight:400;letter-spacing:-.005em;margin:0}
  h1{font-size:clamp(56px, 9vw, 132px); line-height:.92}
  h2{font-size:clamp(34px, 4.5vw, 58px); line-height:1.02}
  h3{font-size:28px; line-height:1.15}

  em, .it{font-style:italic}
  .drop::first-letter{
    font-family:var(--display);
    font-size:5.6em;line-height:.85;
    float:left;margin:.06em .12em 0 -.04em;color:var(--accent);
    font-style:italic;
  }

  a{color:inherit}

  /* ─── nav ───────────────────────────────────────────────────────── */
  .nav{
    position:sticky;top:0;z-index:50;
    background:color-mix(in oklab, var(--paper) 86%, transparent);
    backdrop-filter:blur(8px) saturate(120%);
    -webkit-backdrop-filter:blur(8px) saturate(120%);
    border-bottom:1px solid var(--rule);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
  .nav-mark{font-family:var(--display);font-style:italic;font-size:22px;letter-spacing:-.01em}
  .nav-mark sup{font-family:var(--mono);font-style:normal;font-size:9px;letter-spacing:.16em;color:var(--ink-mute);margin-left:6px;vertical-align:8px}
  .nav-links{display:flex;gap:32px;align-items:center}
  .nav-links a{text-decoration:none;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .nav-links a:hover{color:var(--accent)}
  .nav-cta{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--paper);background:var(--ink);
    padding:10px 16px;border-radius:999px;text-decoration:none;
    border:1px solid var(--ink);transition:all .2s ease;
  }
  .nav-cta:hover{background:var(--accent);border-color:var(--accent)}
  @media (max-width:880px){ .nav-links{display:none} }

  /* ─── hero ──────────────────────────────────────────────────────── */
  .hero{padding:72px 0 96px;position:relative}
  .hero-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:64px;align-items:end}
  @media (max-width:980px){ .hero-grid{grid-template-columns:1fr;gap:48px} }
  .hero-eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:32px}
  .hero-eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .hero-title em{font-style:italic;color:var(--accent)}
  .hero-sub{
    margin-top:28px;max-width:520px;font-size:21px;color:var(--ink-soft);
    font-style:italic;
  }
  .hero-byline{
    margin-top:40px;display:flex;align-items:center;gap:18px;
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-mute);
  }
  .hero-byline strong{color:var(--ink);font-weight:500}
  .hero-byline .sep{width:24px;height:1px;background:var(--rule)}

  /* book cover placeholder */
  .cover-wrap{
    position:relative;perspective:1800px;display:flex;justify-content:center;align-items:end;
    transform:translateY(8px);
  }
  .cover{
    width:340px;aspect-ratio:2/3;
    background:#1b1812;
    color:var(--paper);
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      -16px 0 30px rgba(0,0,0,.18),
      24px 30px 60px rgba(0,0,0,.32),
      0 40px 80px rgba(0,0,0,.22);
    border-radius:2px 4px 4px 2px;
    position:relative;
    padding:34px 30px 30px;
    display:flex;flex-direction:column;justify-content:space-between;
    transform:rotateY(-8deg) rotateX(2deg);
    transition:transform .8s cubic-bezier(.2,.7,.2,1);
  }
  .cover:hover{transform:rotateY(-2deg) rotateX(1deg)}
  .cover::before{
    /* spine shadow */
    content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
    background:linear-gradient(90deg, rgba(0,0,0,.55), rgba(0,0,0,0));
    pointer-events:none;border-radius:2px 0 0 2px;
  }
  .cover::after{
    /* page edge */
    content:"";position:absolute;right:-4px;top:6px;bottom:6px;width:4px;
    background:linear-gradient(90deg, rgba(0,0,0,.35), color-mix(in oklab, var(--paper) 80%, #000));
    border-radius:0 2px 2px 0;
  }
  .cover-top{display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:rgba(241,233,216,.55);text-transform:uppercase}
  .cover-title{font-family:var(--display);font-size:46px;line-height:.95;letter-spacing:-.01em}
  .cover-title .a{display:block;font-style:italic;color:#d9b5a3}
  .cover-bot{display:flex;justify-content:space-between;align-items:flex-end}
  .cover-author{font-family:var(--display);font-style:italic;font-size:20px;color:rgba(241,233,216,.85)}
  .cover-ribbon{
    position:absolute;top:-6px;right:48px;width:18px;height:140px;
    background:linear-gradient(180deg, var(--accent), color-mix(in oklab, var(--accent) 70%, #000));
    box-shadow:0 6px 10px rgba(0,0,0,.3);
    clip-path:polygon(0 0, 100% 0, 100% 100%, 50% 88%, 0 100%);
  }

  .cover-wrap{position:relative}
  .hero-aside{
    margin-top:56px;
    font-family:var(--hand); font-size:32px; color:var(--accent);
    transform:rotate(-3deg);
    max-width:340px; line-height:1.0;
    pointer-events:none;
    position:relative;
  }
  .hero-aside::before{
    content:"";position:absolute;left:-46px;top:18px;width:36px;height:1px;
    background:var(--accent);transform:rotate(20deg);opacity:.55;
  }
  @media (max-width:980px){
    .hero-aside{transform:rotate(-2deg); margin-top:32px}
    .hero-aside::before{display:none}
  }

  /* ─── section ──────────────────────────────────────────────────── */
  .section{padding:104px 0;position:relative}
  .section-head{display:flex;align-items:baseline;justify-content:space-between;gap:24px;margin-bottom:48px}
  .section-num{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase}
  .section-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink-mute);text-transform:uppercase}

  /* ─── sinopsis ─────────────────────────────────────────────────── */
  .sinopsis{display:grid;grid-template-columns:1fr 1.6fr;gap:80px;align-items:start}
  @media (max-width:900px){ .sinopsis{grid-template-columns:1fr;gap:32px} }
  .sinopsis-aside{position:sticky;top:96px}
  .sinopsis-aside .kicker{margin-bottom:14px}
  .sinopsis-aside h2{font-style:italic}
  .sinopsis-body p{margin:0 0 1.1em}
  .sinopsis-body p:first-child{font-size:22px;color:var(--ink-soft);line-height:1.5}

  /* ─── pull quote ──────────────────────────────────────────────── */
  .pull{
    padding:88px 0;
    border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);
    background:
      linear-gradient(0deg, rgba(0,0,0,.02), rgba(0,0,0,.02)),
      var(--paper);
  }
  .pull blockquote{
    margin:0;font-family:var(--display);font-style:italic;
    font-size:clamp(32px, 4.2vw, 58px); line-height:1.05;color:var(--ink);
    max-width:980px;
  }
  .pull blockquote .accent{color:var(--accent)}
  .pull cite{
    display:block;margin-top:32px;font-style:normal;
    font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink-mute);text-transform:uppercase;
  }

  /* ─── fragmentos (diary entries) ──────────────────────────────── */
  .fragments-head{display:flex;align-items:end;justify-content:space-between;gap:32px;margin-bottom:56px;flex-wrap:wrap}
  .fragments-head .head-l{max-width:560px}
  .fragments-head h2 .it{color:var(--accent)}
  .frag-grid{display:grid;grid-template-columns:repeat(12, 1fr);gap:32px}
  .frag{
    background:color-mix(in oklab, var(--paper) 88%, #fff 12%);
    border:1px solid var(--rule);
    border-radius:2px;
    padding:32px 32px 28px;
    position:relative;
    /* faint lined-paper effect */
    background-image:linear-gradient(transparent calc(1.55em - 1px), color-mix(in oklab, var(--rule) 55%, transparent) 1px);
    background-size:100% 1.55em;
    background-position:0 .82em;
  }
  .frag::before{
    content:"";position:absolute;left:54px;top:0;bottom:0;width:1px;background:color-mix(in oklab, var(--accent) 35%, transparent);
  }
  .frag-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .frag-date{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase}
  .frag-place{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-mute);text-transform:uppercase}
  .frag-title{font-family:var(--display);font-style:italic;font-size:24px;margin:6px 0 18px;color:var(--ink)}
  .frag-body{font-size:17.5px;color:var(--ink-soft);font-style:italic;line-height:1.55}
  .frag-body::first-letter{font-weight:500;color:var(--ink)}
  .frag-foot{margin-top:18px;font-family:var(--hand);font-size:20px;color:var(--accent);transform:rotate(-1deg);display:inline-block}

  .frag.f1{grid-column:span 7}
  .frag.f2{grid-column:span 5}
  .frag.f3{grid-column:span 5}
  .frag.f4{grid-column:span 7}
  .frag.f5{grid-column:span 12}
  @media (max-width:900px){ .frag.f1,.frag.f2,.frag.f3,.frag.f4,.frag.f5{grid-column:span 12} }

  /* ─── temas ────────────────────────────────────────────────────── */
  .temas{display:grid;grid-template-columns:1fr 2fr;gap:80px;align-items:start}
  @media (max-width:900px){ .temas{grid-template-columns:1fr;gap:40px} }
  .tema-list{display:flex;flex-direction:column;border-top:1px solid var(--rule)}
  .tema{
    display:grid;grid-template-columns:64px 1fr auto;gap:28px;
    padding:26px 0;border-bottom:1px solid var(--rule);align-items:baseline;
    transition:background .2s ease,padding .2s ease;cursor:default;
  }
  .tema:hover{background:color-mix(in oklab, var(--paper-deep) 60%, transparent);padding-left:14px;padding-right:14px}
  .tema-num{font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:.16em}
  .tema-name{font-family:var(--display);font-size:30px;font-style:italic;color:var(--ink)}
  .tema-name .accent{color:var(--accent);font-style:normal;font-family:var(--serif);font-size:18px;margin-left:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}
  .tema-desc{color:var(--ink-soft);font-size:17px;max-width:520px;line-height:1.5}

  /* ─── joseph / narrador ────────────────────────────────────────── */
  .joseph{
    background:#1b1812;color:#e9dec4;
    margin:0 -100vw;padding:104px 100vw;
    position:relative;overflow:hidden;
  }
  .joseph .container{position:relative}
  .joseph .meta{color:#a89478}
  .joseph h2{color:#f1e9d8;margin-top:6px}
  .joseph h2 em{color:#d9b5a3}
  .joseph-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:start;margin-top:48px}
  @media (max-width:900px){ .joseph-grid{grid-template-columns:1fr;gap:32px} }
  .joseph p{color:#cdbe9a;font-size:19px;line-height:1.6;margin:0 0 1em}
  .joseph .ficha{
    border:1px solid #3b3327;border-radius:2px;padding:28px 28px;
    font-family:var(--mono);font-size:12px;line-height:1.9;color:#cdbe9a;letter-spacing:.06em;
    background:rgba(255,255,255,.02);
  }
  .joseph .ficha dt{color:#8d7e62;text-transform:uppercase;letter-spacing:.14em;font-size:10px;margin-top:14px}
  .joseph .ficha dt:first-child{margin-top:0}
  .joseph .ficha dd{margin:2px 0 0;color:#e9dec4}
  .joseph .ficha dd em{color:#d9b5a3;font-style:italic;font-family:var(--serif);font-size:15px}

  /* ─── reseñas ──────────────────────────────────────────────────── */
  .resena-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
  @media (max-width:900px){ .resena-grid{grid-template-columns:1fr} }
  .resena{
    padding:32px 28px;border:1px solid var(--rule);border-radius:2px;
    display:flex;flex-direction:column;gap:18px;background:color-mix(in oklab, var(--paper) 92%, #fff);
  }
  .resena .stars{color:var(--accent);letter-spacing:4px;font-size:13px}
  .resena blockquote{margin:0;font-style:italic;font-family:var(--display);font-size:22px;line-height:1.22}
  .resena cite{font-style:normal;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--ink-mute);text-transform:uppercase}
  .resena cite b{color:var(--ink);font-weight:500;display:block;margin-bottom:2px}

  /* ─── autor ────────────────────────────────────────────────────── */
  .autor{display:grid;grid-template-columns:280px 1fr;gap:64px;align-items:start}
  @media (max-width:780px){ .autor{grid-template-columns:1fr;gap:32px} }
  .autor-portrait{
    aspect-ratio:3/4;background:color-mix(in oklab, var(--paper-deep) 80%, var(--paper));
    border:1px solid var(--rule);border-radius:2px;
    overflow:hidden;position:relative;
  }
  .autor-portrait img{
    width:100%;height:100%;object-fit:cover;display:block;
    filter:grayscale(.25) contrast(.98) sepia(.08);
  }
  .autor-portrait::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(180deg, transparent 60%, rgba(27,24,18,.18));
    mix-blend-mode:multiply;
  }
  .autor h3{font-style:italic;font-size:42px;margin:6px 0 4px}
  .autor .role{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink-mute);text-transform:uppercase}
  .autor p{margin:18px 0;color:var(--ink-soft);font-size:18px}
  .autor .qa{margin-top:24px;border-top:1px dashed var(--rule);padding-top:24px}
  .autor .qa .q{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
  .autor .qa .a{font-style:italic;font-family:var(--display);font-size:22px;line-height:1.25;color:var(--ink)}

  /* ─── CTA / pay-what-you-want ──────────────────────────────────── */
  .order-head{
    display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;
    margin-bottom:48px;
  }
  @media (max-width:880px){ .order-head{grid-template-columns:1fr;gap:24px} }
  .order-head h2{font-style:italic}
  .order-lede{max-width:520px;color:var(--ink-soft);font-size:19px;margin:0}

  .order-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
  @media (max-width:880px){ .order-grid{grid-template-columns:1fr} }
  .order-card{
    background:color-mix(in oklab, var(--paper) 96%, #fff);
    border:1px solid var(--ink);
    border-radius:2px;padding:40px 40px 36px;
    display:flex;flex-direction:column;gap:22px;
    position:relative;
  }
  .order-card.alt{background:#1b1812;color:#e9dec4;border-color:#1b1812}
  .order-card.alt .order-kicker{color:#a89478}
  .order-card.alt .order-title{color:#f1e9d8}
  .order-card.alt .order-desc{color:#cdbe9a}
  .order-card.alt .order-dl dt{color:#8d7e62}
  .order-card.alt .order-dl dd{color:#e9dec4;border-color:#3b3327}
  .order-card.alt .order-dl code{color:#d9b5a3;background:rgba(255,255,255,.04);border-color:#3b3327}
  .order-card.alt .btn{background:var(--paper);color:#1b1812;border-color:var(--paper)}
  .order-card.alt .btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .order-card.alt .btn-ghost{background:transparent;color:#e9dec4;border-color:rgba(233,222,196,.4)}
  .order-card.alt .btn-ghost:hover{background:var(--paper);color:#1b1812;border-color:var(--paper)}

  .order-card-head{display:flex;align-items:flex-start;gap:24px}
  .order-letter{
    font-family:var(--display);font-style:italic;font-size:68px;line-height:.9;
    color:var(--accent);width:64px;flex-shrink:0;
  }
  .order-card.alt .order-letter{color:#d9b5a3}
  .order-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--ink-mute);text-transform:uppercase;margin-bottom:8px}
  .order-title{font-family:var(--display);font-size:34px;line-height:1.02;color:var(--ink);margin:0}
  .order-desc{margin:0;color:var(--ink-soft);font-size:17.5px;line-height:1.5}
  .order-desc .num{font-family:var(--mono);font-weight:500;color:var(--accent);background:color-mix(in oklab, var(--accent) 10%, transparent);padding:1px 7px;border-radius:3px}

  .order-dl{margin:6px 0 4px;padding:0;display:flex;flex-direction:column;gap:0}
  .order-dl > div{
    display:grid;grid-template-columns:140px 1fr;gap:18px;align-items:baseline;
    padding:12px 0;border-bottom:1px dashed var(--rule);
  }
  .order-dl > div:last-child{border-bottom:0}
  .order-dl dt{
    margin:0;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
    color:var(--ink-mute);text-transform:uppercase;
  }
  .order-dl dd{margin:0;font-family:var(--serif);font-size:18px;color:var(--ink)}
  .order-dl code{
    font-family:var(--mono);font-size:14px;color:var(--accent);
    background:color-mix(in oklab, var(--accent) 8%, transparent);
    padding:2px 8px;border-radius:3px;letter-spacing:.04em;
    border:1px solid color-mix(in oklab, var(--accent) 20%, transparent);
  }

  .order-btn{margin-top:6px;align-self:flex-start}
  .order-foot{
    margin:40px auto 0;max-width:560px;text-align:center;
    font-style:italic;color:var(--ink-soft);font-size:18px;
  }
  .btn{
    display:inline-flex;align-items:center;gap:12px;
    background:var(--ink);color:var(--paper);
    padding:18px 26px;border-radius:999px;
    font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    text-decoration:none;border:1px solid var(--ink);
    transition:all .2s ease;
  }
  .btn:hover{background:var(--accent);border-color:var(--accent)}
  .btn .arrow{transition:transform .2s ease}
  .btn:hover .arrow{transform:translateX(4px)}
  .btn-ghost{background:transparent;color:var(--ink)}
  .btn-ghost:hover{background:var(--ink);color:var(--paper)}

  .ordering-vendors{display:flex;gap:18px;margin-top:24px;flex-wrap:wrap}
  .vendor{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-soft);
    border:1px solid var(--rule);padding:10px 14px;border-radius:999px;text-decoration:none;text-transform:uppercase;
  }
  .vendor:hover{border-color:var(--ink);color:var(--ink)}

  /* ─── footer ───────────────────────────────────────────────────── */
  footer{padding:48px 0 56px;border-top:1px solid var(--rule);margin-top:48px}
  .foot{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
  .foot .left{font-family:var(--display);font-style:italic;font-size:22px}
  .foot .right{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--ink-mute);text-transform:uppercase}

  /* ─── theme variants ──────────────────────────────────────────── */
  body.theme-linen{
    --paper:#eee8dc;--paper-deep:#e0d8c5;--rule:#cabfa6;--accent:#37564a;--accent-soft:#6a8f7f;
  }
  body.theme-ink{
    --paper:#15130f;--paper-deep:#1d1a14;--ink:#efe6d2;--ink-soft:#c9bd9e;--ink-mute:#827759;--rule:#2c2820;
    --accent:#d9b5a3;--accent-soft:#a8836f;
  }
  body.theme-ink .cover{background:#0c0a07;box-shadow:-16px 0 30px rgba(0,0,0,.5), 24px 30px 60px rgba(0,0,0,.6)}
  body.theme-ink .joseph{background:#070605;color:#cdbe9a}
  body.theme-ink .joseph h2{color:#f1e9d8}
  body.theme-ink .order{background:transparent}
  body.theme-ink .btn{background:var(--ink);color:var(--paper)}

  /* hide handwritten margin notes if disabled */
  body.no-handnotes .hero-aside, body.no-handnotes .frag-foot{display:none}
</style>
</head>
